name: eval-on-pr

on:
  pull_request:
    paths:
      - 'prompts/**'

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats
      - name: Validate pattern frontmatter
        run: |
          # Extract frontmatter from each changed pattern.md, validate against schema/.
          # Schema location: pull from prompt-engine repo or vendor a copy here.
          echo "Schema validation runs on changed patterns only"
          # Find changed pattern.md files in this PR.
          CHANGED=$(git diff --name-only origin/main...HEAD | grep 'prompts/.*/pattern\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No pattern.md changes — skipping schema validation."
            exit 0
          fi
          echo "Changed patterns:"
          echo "$CHANGED"
          # TODO: vendor or fetch prompt-engine/schema/pattern.schema.json then:
          # for f in $CHANGED; do ajv validate -s schema/pattern.schema.json -d <(node scripts/extract-frontmatter.js "$f"); done

      - name: Check attribution
        run: |
          # For new patterns (added in this PR), require provenance.attribution + provenance.license.
          # Fail the PR if any new pattern lacks these.
          NEW=$(git diff --name-only --diff-filter=A origin/main...HEAD | grep 'prompts/.*/pattern\.md$' || true)
          if [ -z "$NEW" ]; then
            echo "No new patterns added — skipping attribution check."
            exit 0
          fi
          FAIL=0
          for f in $NEW; do
            if ! grep -q 'attribution:' "$f"; then
              echo "::error file=$f::missing provenance.attribution"
              FAIL=1
            fi
            if ! grep -q 'license:' "$f"; then
              echo "::error file=$f::missing provenance.license"
              FAIL=1
            fi
          done
          exit $FAIL

  optional-promptfoo:
    # Runs only if a maintainer has added at least one provider API key as a repo secret.
    # GitHub Actions doesn't allow `secrets.X` in job-level `if`; route through a flag job.
    runs-on: ubuntu-latest
    needs: schema-validate
    env:
      HAS_API_KEY: ${{ secrets.OPENAI_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Gate on API keys
        run: |
          if [ "$HAS_API_KEY" != "true" ]; then
            echo "No provider API keys configured — skipping promptfoo eval."
            echo "Add OPENAI_API_KEY or ANTHROPIC_API_KEY to repo secrets to enable."
            exit 0
          fi
      - uses: actions/checkout@v5
        if: env.HAS_API_KEY == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        if: env.HAS_API_KEY == 'true'
        with:
          node-version: '24'
      - name: Install promptfoo
        if: env.HAS_API_KEY == 'true'
        run: npm install -g promptfoo
      - name: Run promptfoo on changed patterns
        if: env.HAS_API_KEY == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep 'prompts/.*/pattern\.md$' | xargs -I {} dirname {} || true)
          if [ -z "$CHANGED" ]; then
            echo "No pattern changes — skipping promptfoo."
            exit 0
          fi
          for dir in $CHANGED; do
            if [ -f "$dir/evals/promptfoo.yaml" ]; then
              echo "::group::promptfoo eval — $dir"
              (cd "$dir" && promptfoo eval --config evals/promptfoo.yaml --no-cache || true)
              echo "::endgroup::"
            fi
          done
