description: Evals for rate_argument
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Remote work is failing because companies are calling people back to offices.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: PREMISES — numbered list.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
