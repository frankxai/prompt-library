description: Evals for audit_security_config
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          CONFIG_TYPE: nginx
          CONFIG: `server { listen 80; server_name api.example.com; location / { proxy_pass http://upstream; } }`
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: FINDINGS — table with columns: severity, line, issue, remediation.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
