description: Evals for audit_resume
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          TARGET_ROLE: Senior backend engineer, Go, distributed systems.
          RESUME: 4 years Python at fintech startup.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: ROLE REQUIREMENTS — bullet list.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
