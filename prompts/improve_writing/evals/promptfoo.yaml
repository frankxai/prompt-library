description: Evals for improve_writing
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Essentially, what we're trying to do is fundamentally rethink how we, in essence, approach the problem of remote work, which is, at the end of the day, really about trust.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: The improved text, prose only.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
