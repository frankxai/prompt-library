description: Evals for write_essay
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          TOPIC: AI and onboarding.
          ANGLE: AI shifts onboarding from knowledge-transfer to context-transfer.
          LENGTH: 800 words.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: INTRO (1 paragraph) — hook plus thesis as the final sentence.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
