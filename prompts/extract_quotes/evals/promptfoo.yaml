description: Evals for extract_quotes
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Naval said: 'The compounding only starts when you stop counting.' He was talking about reading habits.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Each item: the verbatim quote in quotation marks, then a dash, then attribution, then a sub-bullet with context.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
