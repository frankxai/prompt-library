description: Evals for extract_ideas
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Reading 200 books changes the reader more than the books change. The 200th book teaches more than the third because the reader has a richer substrate.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Bullet list, 15-40 items.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
