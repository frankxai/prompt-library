description: Evals for analyze_prose
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          AI is changing everything. Companies that don't adopt it will fall behind. The future belongs to those who embrace artificial intelligence.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Three H2 sections: NOVELTY, CLARITY, PROSE Each contains the score and the evidence sentence.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
