description: Evals for check_grammar
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Their going to the store, its closing at 9pm. Me and him will buy snacks.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: ERRORS — numbered list Each item: Error: "<quoted phrase>" → Correction: "<phrase>" — Reason: <one sentence>.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
