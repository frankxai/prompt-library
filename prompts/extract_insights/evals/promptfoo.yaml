description: Evals for extract_insights
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Three founders all said the same thing — they didn't quit when the data was bad, they quit when the people were.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Each insight is the abstracted pattern, not a paraphrase of input.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
