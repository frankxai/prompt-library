description: Evals for write_cover_letter
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          ROLE: Senior backend engineer, Go, distributed systems.
          CANDIDATE: 5 years Python at fintech, led migration of monolith to event-driven microservices.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Cover letter prose, 250-400 words.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
