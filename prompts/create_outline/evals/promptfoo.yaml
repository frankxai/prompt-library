description: Evals for create_outline
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Topic: How AI changes onboarding for engineers. Audience: engineering managers at 50-500 person companies.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: OBJECTIVE — one sentence.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
