description: Evals for create_quiz
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Photosynthesis converts light energy, water, and CO2 into glucose and oxygen, in chloroplasts.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Section 1: QUESTIONS — numbered list, question type tagged in brackets.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
