description: Evals for create_micro_summary
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          AI assistants are becoming central to knowledge work. Studies show 30% productivity gains for code, 15% for writing, with quality dependent on prompt skill.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Headline: <one sentence>.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
