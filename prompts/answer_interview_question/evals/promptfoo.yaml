description: Evals for answer_interview_question
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          QUESTION: Tell me about a time you had to influence without authority.
          CANDIDATE_CONTEXT: PM at SaaS, drove cross-team migration without budget control.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: The answer, prose only, 90-150 words.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
