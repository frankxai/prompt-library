description: Evals for check_plagiarism
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          INPUT_PASSAGE: The compounding only starts when you stop counting.
          REFERENCE: Naval Ravikant tweet: "The compounding only starts when you stop counting.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: VERBATIM MATCHES — pairs (input quote / reference quote) with the overlap percentage.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
