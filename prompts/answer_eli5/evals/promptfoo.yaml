description: Evals for answer_eli5
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          TOPIC: How does a transformer model work?
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: 4-6 short paragraphs.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
