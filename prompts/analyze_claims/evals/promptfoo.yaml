description: Evals for analyze_claims
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Remote work makes people lazier. Within five years, most knowledge workers will return to offices. The data is obvious.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Four H2 sections: FACTUAL CLAIMS, OPINION CLAIMS, PREDICTION CLAIMS, RHETORICAL DEVICES.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
