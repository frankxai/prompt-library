description: Evals for analyze_logs
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          2026-05-14 10:32:01 ERROR db connection refused\n2026-05-14 10:32:02 ERROR db connection refused\n...
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Five H2 sections: ANOMALIES, TIMELINE, ROOT-CAUSE HYPOTHESES, NEXT CHECKS, SEVERITY.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
