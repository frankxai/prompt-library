description: Evals for compare_and_contrast
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          Compare Claude Opus 4.7 and GPT-5 for long-context summarization.
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: H2: COMPARISON (markdown table).
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
