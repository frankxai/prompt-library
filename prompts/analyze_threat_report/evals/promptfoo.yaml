description: Evals for analyze_threat_report
providers:
  - anthropic:messages:claude-opus-4-7
prompts:
  - file://../pattern.md
defaultTest:
  assert:
    - type: not-contains
      value: ['delve', 'dive into', 'certainly', 'absolutely', "it's worth noting"]
    - type: javascript
      value: "output.length > 50 && output.length < 4000"
tests:
  - vars:
      input: |
          APT29 deployed a new loader, FROZENMIST, targeting European diplomatic missions via spear-phishing emails carrying ISO attachments. Hashes: a1b2c3...
    assert:
      - type: llm-rubric
        rubric: |
          Score 1-5. Output must satisfy: Five H2 sections: ACTORS, TTPs, IOCs, TARGETS, MITIGATIONS.
            Penalize: hallucination, format violation, banned phrase.
        threshold: 0.8
